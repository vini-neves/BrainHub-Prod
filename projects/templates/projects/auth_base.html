{# projects/templates/projects/auth_base.html #}
{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Autenticação{% endblock %} - Minha Plataforma</title>
    
    <style>
        :root {
            --primary-color: {{ agency_primary_color|default:"#333366" }};
            --secondary-color: {{ agency_secondary_color|default:"#007bff" }};
            --text-on-primary: #ffffff;
        }
    </style>
    
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    
    <div class="login-brand-side">
        <div class="brand-content">
            <div class="brand-logo">
                <img src="{{ agency_logo.url }}" alt="Logo da Agência" class="agency-logo" style="max-height: 200px;"/>
                <h1>{{ request.tenant.name }}</h1>
            </div>
            <p class="brand-tagline">Gerencie seus projetos, clientes e mídias em um único lugar.</p>
        </div>
        <div class="brand-overlay"></div>
    </div>
    
    {% block extra_js %}{% endblock %}

</body>
</html>

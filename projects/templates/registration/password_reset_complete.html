{% extends "projects/auth_base.html" %}

{% block title %}Senha Alterada{% endblock %}

{% block content %}
    
    <div style="text-align: center; padding: 20px 0;">
        <div style="font-size: 4rem; color: #198754; margin-bottom: 20px;">
            <i class="fa-solid fa-circle-check"></i>
        </div>

        <div class="login-header">
            <h2 style="font-size: 1.8rem; margin-bottom: 15px;">Senha Alterada!</h2>
            
            <p style="color: #555; font-size: 1rem; line-height: 1.6; margin-bottom: 30px;">
                Sua senha foi redefinida com sucesso. <br>
                Você já pode acessar sua conta com a nova credencial.
            </p>
        </div>

        <a href="{% url 'login' %}" class="btn-login" style="text-decoration: none; display: inline-block; background-color: #198754;">
            FAZER LOGIN AGORA
        </a>
    </div>

{% endblock %}
